<!DOCTYPE html>
<html lang="en">
<head>
    <title>Student Registration</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            font-family: 'DM Sans', sans-serif;

            /* ✅ Background image on LEFT side */
            background-image: url('https://images.unsplash.com/photo-1580582932707-520aed937b7b?w=1920');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
        }

        /* ✅ Left side - empty (shows background image) */
        .left-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 60px;
            background: linear-gradient(to right, rgba(0,0,0,0.55), transparent);
        }

        .left-panel h2 {
            font-family: 'Playfair Display', serif;
            font-size: 48px;
            color: #ffffff;
            line-height: 1.2;
            margin-bottom: 16px;
            text-shadow: 0 2px 10px rgba(0,0,0,0.4);
        }

        .left-panel p {
            font-size: 17px;
            color: rgba(255,255,255,0.85);
            max-width: 380px;
            line-height: 1.7;
        }

        .badge {
            display: inline-block;
            background: rgba(255,255,255,0.15);
            border: 1px solid rgba(255,255,255,0.3);
            color: white;
            padding: 6px 16px;
            border-radius: 20px;
            font-size: 13px;
            margin-bottom: 20px;
            backdrop-filter: blur(6px);
            letter-spacing: 1px;
        }

        /* ✅ RIGHT side - form panel */
        .form-container {
            width: 460px;
            min-height: 100vh;
            background: #ffffff;
            padding: 50px 40px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            box-shadow: -12px 0 40px rgba(0, 0, 0, 0.25);
            overflow-y: auto;
        }

        .form-header {
            margin-bottom: 30px;
        }

        .form-header h1 {
            font-family: 'Playfair Display', serif;
            font-size: 28px;
            color: #1a1a2e;
            margin-bottom: 6px;
        }

        .form-header p {
            font-size: 14px;
            color: #888;
        }

        .divider {
            width: 50px;
            height: 4px;
            background: linear-gradient(to right, #3498db, #2ecc71);
            border-radius: 2px;
            margin: 12px 0 0;
        }

        .form-group {
            margin-bottom: 18px;
        }

        label {
            display: block;
            margin-bottom: 6px;
            font-weight: 600;
            color: #2c3e50;
            font-size: 13px;
            letter-spacing: 0.3px;
        }

        input {
            width: 100%;
            padding: 11px 14px;
            border: 1.5px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            font-family: 'DM Sans', sans-serif;
            color: #333;
            background: #fafafa;
            transition: border-color 0.3s, box-shadow 0.3s, background 0.3s;
        }

        input:focus {
            border-color: #3498db;
            background: #fff;
            outline: none;
            box-shadow: 0 0 0 3px rgba(52, 152, 219, 0.12);
        }

        input::placeholder {
            color: #bbb;
            font-size: 13px;
        }

        /* Two column row */
        .row {
            display: flex;
            gap: 14px;
        }

        .row .form-group {
            flex: 1;
        }

        .btn {
            width: 100%;
            padding: 13px;
            background: linear-gradient(135deg, #3498db, #2ecc71);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 600;
            font-family: 'DM Sans', sans-serif;
            cursor: pointer;
            transition: opacity 0.3s, transform 0.2s;
            margin-top: 6px;
            letter-spacing: 0.5px;
        }

        .btn:hover {
            opacity: 0.92;
            transform: translateY(-1px);
        }

        .btn:active {
            transform: translateY(0);
        }

        .login-link {
            text-align: center;
            margin-top: 18px;
            font-size: 13px;
            color: #888;
        }

        .login-link a {
            color: #3498db;
            text-decoration: none;
            font-weight: 600;
        }

        .login-link a:hover {
            text-decoration: underline;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .left-panel { display: none; }
            .form-container { width: 100%; }
        }
    </style>
</head>

<body>

    <!-- ✅ LEFT SIDE — background image with text overlay -->
    <div class="left-panel">
        <span class="badge">🎓 ADITYA UNIVERSITY</span>
        <h2>Begin Your<br>Academic Journey</h2>
        <p>Join thousands of students shaping the future. Register today and unlock access to world-class education.</p>
    </div>

    <!-- ✅ RIGHT SIDE — Registration Form -->
    <div class="form-container">
        <div class="form-header">
            <h1>Student Registration</h1>
            <p>Fill in the details below to create your account</p>
            <div class="divider"></div>
        </div>

        <form action="https://adityauniversity.in/" target="_blank">

            <!-- First & Last Name in one row -->
            <div class="row">
                <div class="form-group">
                    <label for="firstname">First Name</label>
                    <input type="text" id="firstname" name="firstname"
                           placeholder="First name" required>
                </div>
                <div class="form-group">
                    <label for="lastname">Last Name</label>
                    <input type="text" id="lastname" name="lastname"
                           placeholder="Last name" required>
                </div>
            </div>

            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" name="email"
                       placeholder="Enter your email" required>
            </div>

            <div class="form-group">
                <label for="phone">Phone Number</label>
                <input type="tel" id="phone" name="phone"
                       placeholder="10-digit phone number"
                       pattern="[0-9]{10}" maxlength="10"
                       onkeypress="return /[0-9]/.test(event.key)"
                       required>
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password"
                       placeholder="Create a password" required>
            </div>

            <div class="form-group">
                <label for="dob">Date of Birth</label>
                <input type="date" id="dob" name="dob" required>
            </div>

            <button type="submit" class="btn">Create Account →</button>

            <p class="login-link">Already have an account? <a href="#">Log in</a></p>

        </form>
    </div>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Contact Page</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <nav>
    <a href="/">Home</a>
    <a href="/about">About</a>
    <a href="/contact">Contact</a>
    <a href="/hello">Hello</a>
  </nav>

  <div class="container">
    <h1>Contact Page</h1>
    <p>Fill in this form to contact us.</p>

    <!-- HTML Form -->
    <form onsubmit="handleSubmit(event)">

      <label>Your Name:</label><br>
      <input type="text" placeholder="Enter your name" required /><br><br>

      <label>Your Email:</label><br>
      <input type="email" placeholder="Enter your email" required /><br><br>

      <label>Message:</label><br>
      <textarea rows="4" cols="40" placeholder="Write your message..."></textarea><br><br>

      <button type="submit">Send Message</button>
    </form>

    <p id="msg" style="color: green; font-weight: bold;"></p>

    <a href="/" class="btn">← Back to Home</a>
  </div>

  <script>
    function handleSubmit(e) {
      e.preventDefault();
      document.getElementById('msg').textContent = 'Message sent successfully!';
    }
  </script>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
<title>Simple Selectors</title>
<style>
/* Universal Selector */
* {
  font-family: Arial;
}

/* Element Selector */
div>span {
  color:yellowgreen;
}

/* ID Selector */
#heading {
  color: blueviolet;
}

/* Class Selector */
.box {
  background-color: darkgreen;
  padding: 15px;
}

/* Group Selector */
h2,h3{
  color: coral;
}
</style>
</head>
<body>

<h1 id="heading">ID Selector Example</h1>

<p>Element Selector Example</p>

<div class="box">Class Selector Example</div>

<h2>Group Selector</h2>
<h3>Group Selector</h3>

</body>
</html>

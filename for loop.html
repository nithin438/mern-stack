<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>loops</title>
</head>
<body>
    <script>
        document.write("for loop example<br>");
        for(var i=1; i<=10; i++){
            document.write("Iteration number: " + i + "<br>");
        }
        document.write("<br>while loop example<br>");
        var k = 1;
        do {
            document.write("Iteration number: " + k + "<br>");
            k++;
        } while (k <= 10);
</script>
</body>
</html>
